services:
  migrate:
    build: .
    command:
      - python
      - manage.py
      - migrate

    restart: "no"

  gunicorn:
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn mysite.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    restart: "always"
    depends_on:
      migrate:
          condition: service_completed_successfully
